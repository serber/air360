<div class='stack stack--scene'>
    <section class='stats'>
        <div class='stat'><div class='stat__label'>Mode</div><div class='stat__value'><code>{{NETWORK_MODE}}</code></div></div>
        <div class='stat'><div class='stat__label'>Uplink</div><div class='stat__value'><code>{{UPLINK_STAT}}</code></div></div>
        <div class='stat'><div class='stat__label'>Uptime</div><div class='stat__value'>{{UPTIME}}</div></div>
        <div class='stat'><div class='stat__label'>Boot Count</div><div class='stat__value'>{{BOOT_COUNT}}</div></div>
    </section>

    <section class='panel panel--identity stack'>
        <h2>Connection</h2>
        {{CONNECTION_BLOCK}}
    </section>

    <section class='panel panel--overview stack'>
        <h2>Backends</h2>
        {{BACKEND_BLOCK}}
    </section>

    <section class='panel panel--overview stack'>
        <h2>Sensors</h2>
        <p class='muted'>Configured sensors: <code>{{SENSOR_COUNT}}</code></p>
        {{SENSOR_BLOCK}}
    </section>
</div>
