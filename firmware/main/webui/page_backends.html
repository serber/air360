{{NOTICE}}
<form class='stack stack--scene' method='POST' action='/backends' data-dirty-track='backends'>
    <div class='panel panel--policy stack'>
        <h2>Upload settings</h2>
        <div class='field'>
            <label for='upload_interval_ms'>Upload interval (ms)</label>
            <input class='input' id='upload_interval_ms' name='upload_interval_ms' inputmode='numeric' value='{{UPLOAD_INTERVAL_VALUE}}'>
        </div>
        <p class='hint'>Allowed range: <code>10000</code> to <code>300000</code> ms.</p>
    </div>
    {{BACKEND_CARDS}}
    <div class='split-actions'>
        <button class='button' type='submit'>Save</button>
    </div>
</form>
