{{NOTICE}}
<form id='backends-form' method='POST' action='/backends' data-dirty-track='backends'>
  <section class='card'>
    <div class='card-header'><div><h3 class='card-title'>Upload settings</h3><div class='card-sub'>How often measurements are flushed to all enabled backends</div></div></div>
    <div class='card-body'>
      <label class='field'>
        <span class='field-label'>Upload interval (ms)</span>
        <input class='input' id='upload_interval_ms' name='upload_interval_ms' inputmode='numeric' value='{{UPLOAD_INTERVAL_VALUE}}'>
        <span class='field-hint'>Allowed range: <code>{{UPLOAD_INTERVAL_MIN}}</code> to <code>{{UPLOAD_INTERVAL_MAX}}</code> ms.</span>
      </label>
    </div>
  </section>

  {{BACKEND_CARDS}}

</form>
