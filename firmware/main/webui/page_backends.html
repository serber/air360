{{NOTICE}}
<form class='stack' method='POST' action='/backends' data-dirty-track='backends'>
  <section class='card'>
    <div class='card-header'><div><h3 class='card-title'>Upload settings</h3></div></div>
    <div class='card-body'>
      <label class='field'>
        <span class='field-label'>Upload interval (ms)</span>
        <input class='input' id='upload_interval_ms' name='upload_interval_ms' inputmode='numeric' value='{{UPLOAD_INTERVAL_VALUE}}'>
        <span class='field-hint'>Allowed range: <code>10000</code> to <code>300000</code> ms.</span>
      </label>
    </div>
  </section>

  {{BACKEND_CARDS}}

  <div class='row-end'>
    <button class='btn primary' type='submit'>Save</button>
  </div>
</form>
