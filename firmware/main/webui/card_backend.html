<div class='panel stack' data-backend-card>
    <h2>{{DISPLAY_NAME}}</h2>
    <div class='meta'>
        <span class='pill'>Key <code>{{BACKEND_KEY}}</code></span>
        <span class='pill'>Implemented {{IMPLEMENTED}}</span>
    </div>
    <label class='checkbox'>
        <input type='checkbox' name='enabled_{{BACKEND_KEY_ATTR}}' {{ENABLED_CHECKED}} data-backend-enabled-toggle>
        <span>
            <span class='checkbox__label'>Enabled</span><br>
            <span class='hint'>Stored in backend config and used by the upload manager on the next cycle.</span>
        </span>
    </label>
    {{ENDPOINT_BLOCK}}
    {{BEARER_TOKEN_BLOCK}}
    {{STATUS_BLOCK}}
</div>
