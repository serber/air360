<section class='card' data-backend-card>
  <div class='card-header'>
    <div><h3 class='card-title'>{{DISPLAY_NAME}}</h3></div>
    <div class='card-right'>
      <button class='switch' type='button' data-drives-checkbox='enabled_{{BACKEND_KEY_ATTR}}' data-reveals='backend-body-{{BACKEND_KEY_ATTR}}' aria-label='Toggle {{DISPLAY_NAME}}'></button>
      <input type='checkbox' name='enabled_{{BACKEND_KEY_ATTR}}' {{ENABLED_CHECKED}} data-backend-enabled-toggle hidden>
    </div>
  </div>
  <div class='card-body stack-14' id='backend-body-{{BACKEND_KEY_ATTR}}' data-backend-fields>
    {{HTTPS_BLOCK}}
    {{ENDPOINT_BLOCK}}
    {{DEVICE_ID_OVERRIDE_BLOCK}}
    {{STATUS_BLOCK}}
  </div>
</section>
