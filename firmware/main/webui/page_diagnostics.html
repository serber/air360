<div class='row-4'>
  <div class='stat'><div class='stat-label'>Total heap</div><div class='stat-value sm'>{{TOTAL_HEAP}}</div></div>
  <div class='stat'><div class='stat-label'>Free heap</div><div class='stat-value sm'>{{FREE_HEAP}}</div></div>
  <div class='stat'><div class='stat-label'>Min heap</div><div class='stat-value sm'>{{MIN_HEAP}}</div></div>
  <div class='stat'><div class='stat-label'>Largest block</div><div class='stat-value sm'>{{LARGEST_BLOCK}}</div></div>
</div>

<section class='card'>
  <div class='card-header'><div><h3 class='card-title'>Tasks</h3></div></div>
  <div class='card-body'>{{TASK_BLOCK}}</div>
</section>

<section class='card'>
  <div class='card-header'><div><h3 class='card-title'>Network recovery</h3></div></div>
  <div class='card-body'>{{NETWORK_BLOCK}}</div>
</section>

<section class='card runtime-dump'>
  <div class='card-header'>
    <div><h3 class='card-title'>Application logs</h3></div>
    <div class='card-right'>
      <span class='muted' data-logs-status aria-live='polite'></span>
    </div>
  </div>
  <textarea class='console-area' readonly spellcheck='false' data-logs-console>{{LOG_CONTENTS}}</textarea>
</section>

<section class='card runtime-dump'>
  <div class='card-header'>
    <div><h3 class='card-title'>Raw status JSON</h3></div>
    <div class='card-right'>
      <span class='muted' data-copy-runtime-dump-status aria-live='polite'></span>
      <button type='button' class='btn sm' data-copy-runtime-dump>Copy JSON</button>
    </div>
  </div>
  <textarea class='console-area runtime-dump__console' readonly spellcheck='false'>{{STATUS_JSON_DUMP}}</textarea>
</section>
