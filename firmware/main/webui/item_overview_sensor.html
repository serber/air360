<article class='list-card list-card--sensor'>
    <div class='list-card__title'>{{DISPLAY_NAME}}</div>
    <div class='meta'>
        <span class='pill'>{{BINDING_SUMMARY}}</span>
        <span class='pill'>poll {{POLL_INTERVAL_MS}} ms</span>
        <span class='pill'>state {{STATE_KEY}}</span>
        <span class='pill'>queued {{QUEUED_SAMPLE_COUNT}}</span>
    </div>
    {{READINGS_BLOCK}}
    {{LAST_ERROR_BLOCK}}
</article>
